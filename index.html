                { name: "Tom Ford Oud Wood", desc: "Oud y sándalo exótico", img: "https://fimgs.net/mdimg/perfume/375x500.1826.jpg", link: "https://www.amazon.com/s?k=Tom+Ford+Oud+Wood", g: "U" },
                { name: "Libre Intense YSL", desc: "Lavanda y vainilla intensa", img: "https://fimgs.net/mdimg/perfume/375x500.62963.jpg", link: "https://www.amazon.com/s?k=YSL+Libre+Intense", g: "F" },
                { name: "Valentino Uomo Intense", desc: "Cuero e iris oscuro", img: "https://fimgs.net/mdimg/perfume/375x500.36575.jpg", link: "https://www.amazon.com/s?k=Valentino+Uomo+Intense", g: "M" },
                { name: "CH Men Privé", desc: "Whisky, cuero y madera", img: "https://fimgs.net/mdimg/perfume/375x500.31890.jpg", link: "https://www.amazon.com/s?k=CH+Men+Prive", g: "M" },
                { name: "Lancôme Idôle", desc: "Rosa y jazmín con fondo amaderado", img: "https://fimgs.net/mdimg/perfume/375x500.55389.jpg", link: "https://www.amazon.com/s?k=Lancome+Idole", g: "F" }
            ]
        };

        /* ── IMAGEN DEL DUPE ── */
        const DUPE_IMG = "images/art-of-perfume-dupe.jpeg";

        function startQuiz() {
            document.getElementById("start").style.display = "none";
            showQuestion();
        }

        function updateProgress() {
            const pct = (index / questions.length) * 100;
            const bar = document.getElementById("progress");
            bar.style.width = pct + "%";
            bar.parentElement.setAttribute("aria-valuenow", Math.round(pct));
        }

        function showQuestion() {
            updateProgress();
            const q = questions[index];
            const container = document.getElementById("answers");
            document.getElementById("question").innerText = q.q;
            container.innerHTML = "";
            q.options.forEach(function(o) {
                const btn = document.createElement("button");
                btn.innerText = o.text;
                btn.onclick = function() { selectAnswer(o.type, o.gender); };
                container.appendChild(btn);
            });
        }

        function selectAnswer(type, g) {
            if (g) gender = g;
            if (type !== "_") score[type]++;
            index++;
            if (index < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function showResult() {
            document.getElementById("progress").style.width = "100%";
            document.getElementById("progress").parentElement.setAttribute("aria-valuenow", "100");

            const result = Object.keys(score).reduce(function(a, b) {
                return score[a] > score[b] ? a : b;
            });
            const p = profiles[result];

            let pool = allPerfumes[result].filter(function(x) {
                return gender === "U" || x.g === "U" || x.g === gender;
            });
            if (pool.length < 3) pool = allPerfumes[result];
            const picked = shuffle([...pool]).slice(0, 4);

            const dupeNames = {
                citrico: "Acqua Fresh",
                floral: "Bloom Garden",
                dulce: "Sweet Noir",
                fuerte: "Dark Oud"
            };
            const dupeDescs = {
                citrico: "Inspirado en Acqua di Gio — frescura marina premium",
                floral: "Inspirado en Gucci Bloom — jardín floral en tu piel",
                dulce: "Inspirado en Black Opium — café y vainilla adictiva",
                fuerte: "Inspirado en Baccarat Rouge 540 — lujo accesible"
            };

            let html = '<div class="profile-card">'
                + '<h3>' + p.title + '</h3>'
                + '<p class="profile-desc">' + p.desc + '</p>'
                + '<div class="profile-stats">'
                + '<div class="stat"><div class="stat-label">🎵 Notas Ideales</div><div class="stat-value">' + p.notas + '</div></div>'
                + '<div class="stat"><div class="stat-label">📅 Ocasión</div><div class="stat-value">' + p.ocasion + '</div></div>'
                + '<div class="stat"><div class="stat-label">🌤️ Estación</div><div class="stat-value">' + p.estacion + '</div></div>'
                + '<div class="stat"><div class="stat-label">💎 Personalidad</div><div class="stat-value">' + p.personalidad + '</div></div>'
                + '</div>'
                + '<p style="font-size:11px;color:#6a38c2;margin:10px 0 0;text-align:center"><strong>💡 Tip:</strong> ' + p.tip + '</p>'
                + '</div>';

            html += '<div class="perfume-grid">'
                + '<div class="dupe-card">'
                + '<span class="dupe-badge">🏆 RECOMENDACIÓN #1</span><br>'
                + '<span class="dupe-tag">✨ Exclusivo Art of Perfume</span>'
                + '<img src="' + DUPE_IMG + '" alt="' + dupeNames[result] + ' – Art of Perfume" onerror="this.style.background=\'linear-gradient(135deg,#6a38c2,#9c5ef5)\';this.style.height=\'120px\';this.alt=\'Art of Perfume\'">'
                + '<h3>🌟 ' + dupeNames[result] + ' — Art of Perfume</h3>'
                + '<p>' + dupeDescs[result] + '</p>'
                + '<p class="dupe-price">💰 Misma fragancia, fracción del precio</p>'
                + '<a class="buy-dupe" href="https://www.tiktok.com/@artofperfume" target="_blank" rel="noopener">🛍️ Comprar en TikTok Shop →</a>'
                + '</div>';

            picked.forEach(function(x) {
                html += '<div class="perfume-card">'
                    + '<img src="' + x.img + '" alt="' + x.name + '" onerror="this.style.background=\'#ede7ff\';this.style.height=\'80px\'">'
                    + '<h3>' + x.name + '</h3>'
                    + '<p>' + x.desc + '</p>'
                    + '<a class="buy-link" href="' + x.link + '" target="_blank" rel="noopener">🛒 Ver en tienda</a>'
                    + '</div>';
            });

            html += '</div>'
                + '<button class="restart" onclick="location.reload()">🔄 Reiniciar Quiz</button>';

            document.getElementById("question").innerText = "Tu Perfil Olfativo";
            document.getElementById("answers").innerHTML = html;
        }
    </script>
</body>

</html>
